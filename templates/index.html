<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shopping Assistant</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>
<script src="{{ url_for('static', filename='js/theme.js') }}"></script>

<header class="app-header">
  <div class="brand">
    <span class="logo-mark">🛍️</span> Shopping Assistant
  </div>
  <div class="header-actions">
    <button class="icon-btn" onclick="toggleTheme()" title="Toggle dark mode">
      <span data-theme-icon>🌙</span>
    </button>
    <div style="position:relative;">
      <button class="avatar" id="avatarBtn" title="{{ user.name }}">
        {{ user.name[0] | upper }}
      </button>
      <div id="avatarMenu" style="display:none; position:absolute; right:0; top:46px; background:var(--surface); border:1px solid var(--border); border-radius:12px; box-shadow:var(--shadow-lg); min-width:180px; overflow:hidden; z-index:30;">
        <div style="padding:12px 16px; border-bottom:1px solid var(--border); font-size:0.85rem;">
          <strong>{{ user.name }}</strong><br>
          <span style="color:var(--text-muted); font-size:0.78rem;">{{ user.email }}</span>
        </div>
        <a href="{{ url_for('auth.logout') }}" style="display:block; padding:12px 16px; text-decoration:none; color:var(--danger); font-size:0.9rem;">Logout</a>
      </div>
    </div>
  </div>
</header>

<div class="container">
  <section class="hero">
    <h1>Find the Best Products with AI</h1>
    <p>Compare prices, reviews, and ratings instantly across every store.</p>
  </section>

  <form id="searchForm">
    <div class="search-shell">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" id="query" placeholder="Search iPhone under ₹50000..." autocomplete="off" required>
        <button type="button" class="mic-btn" id="micBtn" title="Voice search">🎤</button>
        <button type="submit" class="btn btn-primary">Search</button>
      </div>
    </div>
  </form>

  <div class="chip-row" id="categoryChips">
    <span class="chip" data-query="Best smartphones">📱 Phones</span>
    <span class="chip" data-query="Best laptops">💻 Laptops</span>
    <span class="chip" data-query="Best wireless earbuds">🎧 Earbuds</span>
    <span class="chip" data-query="Best running shoes">👟 Shoes</span>
    <span class="chip" data-query="Best smart watches">⌚ Smart Watches</span>
  </div>

  <div class="filters-bar">
    <div class="filter-group">
      <label for="budgetRange">Max budget: <strong id="budgetValue">Any</strong></label>
      <input type="range" id="budgetRange" min="0" max="200000" step="1000" value="0">
    </div>
  </div>

  <div class="recent-searches" id="recentSearches"></div>

  {% if welcome_message %}
  <div id="welcomeMessageData" data-message="{{ welcome_message }}" hidden></div>
  {% endif %}

  <div class="chat-area" id="chatArea"></div>
</div>

<div class="compare-bar" id="compareBar" hidden>
  <span id="compareCount">0 selected</span>
  <div class="compare-bar-actions">
    <button type="button" class="btn btn-outline" id="compareClearBtn">Clear</button>
    <button type="button" class="btn btn-primary" id="compareGoBtn">Compare</button>
  </div>
</div>

<div class="compare-modal-overlay" id="compareModalOverlay" hidden>
  <div class="compare-modal">
    <button type="button" class="compare-modal-close" id="compareModalClose">✕</button>
    <div id="compareModalBody"></div>
  </div>
</div>

<div class="compare-modal-overlay" id="dealModalOverlay" hidden>
  <div class="compare-modal deal-modal">
    <button type="button" class="compare-modal-close" id="dealModalClose">✕</button>
    <div id="dealModalBody"></div>
  </div>
</div>

<script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
